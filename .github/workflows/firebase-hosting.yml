name: Deploy Frontend on Path Changes

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "client/**/*"
      - "package.json"
  pull_request:
    paths:
      - "client/**/*"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install root deps (if any)
        run: npm ci --ignore-scripts || true

      - name: Verify env var is set
        run: |
          if [ -z "$VITE_CLERK_PUBLISHABLE_KEY" ]; then
            echo "❌ VITE_CLERK_PUBLISHABLE_KEY is EMPTY or not set!"
            exit 1
          else
            echo "✅ VITE_CLERK_PUBLISHABLE_KEY is set (length: ${#VITE_CLERK_PUBLISHABLE_KEY})"
          fi
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Install & Build client
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          cd client
          npm ci
          echo "VITE_CLERK_PUBLISHABLE_KEY=$VITE_CLERK_PUBLISHABLE_KEY" > .env.production
          npx vite build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: ${{ github.ref == 'refs/heads/main' && 'live' || 'preview' }}
          projectId: autosagex
          entryPoint: "./client"
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
