name: Build and Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - "server/**"

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lagnajit09/autosage/autosage-server
  CONTAINER_NAME: autosage-server

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          script_stop: true
          script: |
            set -e

            echo ">>> Logging into GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo ">>> Pulling latest image..."
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            echo ">>> Stopping and removing existing container (if any)..."
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            echo ">>> Starting new container..."
            docker run -d \
              -p 8000:8000 \
              --env-file ~/autosage-server/server.env \
              -e GOOGLE_APPLICATION_CREDENTIALS=/app/creds/service-account.json \
              -v ~/autosage-server/gcs_key.json:/app/creds/service-account.json:ro \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              ghcr.io/${{ env.IMAGE_NAME }}:latest

            echo ">>> Removing dangling images to free disk space..."
            docker image prune -f

            echo ">>> Container started successfully."

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Health check inside VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          script: |
            echo ">>> Waiting 30s for server to warm up..."
            sleep 30

            echo ">>> Hitting health endpoint..."
            RESPONSE=$(curl --silent --max-time 15 --write-out "\n%{http_code}" http://localhost:8000/api/health/)
            HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
            HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)

            echo "Response body : $HTTP_BODY"
            echo "HTTP status   : $HTTP_CODE"

            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "Health check FAILED — expected 200, got $HTTP_CODE"
              exit 1
            fi

            echo "Health check PASSED."
