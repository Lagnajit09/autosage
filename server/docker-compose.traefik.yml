# ── autosage – Production Docker Compose (Traefik edition) ────────────────────
#
# Services
# ────────
#   traefik      Reverse proxy + TLS termination (Let's Encrypt)  → :80, :443
#   server       Django ASGI / SSE streaming server                → via Traefik
#
# Zero-downtime deploy
# ────────────────────
#   docker compose -f docker-compose.traefik.yml pull server
#   docker compose -f docker-compose.traefik.yml up -d --no-deps --wait server
#
#   `--wait` blocks until the server healthcheck passes, then Traefik
#   automatically routes to the new container. The old container keeps
#   handling in-flight requests until the new one is healthy.
#
# SSE / Streaming notes
# ─────────────────────
# • Traefik `sse-headers` middleware injects `X-Accel-Buffering: no` on every
#   response, disabling buffering at the Traefik layer.
# • The application itself sets the same header (belt-and-braces).
# • Uvicorn is started with --http h11 to lock HTTP/1.1 for SSE/NDJSON.
# • PYTHONUNBUFFERED=1 is enforced in both Dockerfiles and here.
# • stop_grace_period: 35s gives in-flight streams 30 s to finish.
#
# First-time setup
# ────────────────
#   1. Set TRAEFIK_DOMAIN in ../.env.traefik  (e.g. TRAEFIK_DOMAIN=api.example.com)
#   2. Set ACME_EMAIL  in ../.env.traefik     (e.g. ACME_EMAIL=you@example.com)
#   3. Copy ../.env.server.example → ../.env.server and fill in secrets.
#   4. Place GCS service-account JSON at ../gcs-key.json
#   5. touch ../acme.json && chmod 600 ../acme.json
#   6. docker compose -f docker-compose.traefik.yml up -d

version: "3.9"

networks:
  # Traefik uses this network to discover routable services
  traefik-public:
    driver: bridge

volumes:
  letsencrypt: # Persists ACME TLS certificates across restarts

# ── Traefik ──────────────────────────────────────────────────────────────────
services:
  traefik:
    image: traefik:v3.3
    container_name: autosage-traefik
    restart: unless-stopped

    command:
      # ── Providers ─────────────────────────────────────────────────────────
      - "--providers.docker=true"
      # Only route containers that explicitly opt-in via label
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=traefik-public"

      # ── Entry points ──────────────────────────────────────────────────────
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web-api.address=:8000"
      - "--entrypoints.websecure.address=:443"

      # Increase timeouts for long-lived SSE connections
      - "--entrypoints.web.transport.respondingTimeouts.readTimeout=0"
      - "--entrypoints.web.transport.respondingTimeouts.writeTimeout=0"
      - "--entrypoints.web-api.transport.respondingTimeouts.readTimeout=0"
      - "--entrypoints.web-api.transport.respondingTimeouts.writeTimeout=0"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=0"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=0"

      # ── TLS / Let's Encrypt (Optional, disabled if no domain) ─────────────
      # - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      # - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

    ports:
      - "80:80"
      - "8000:8000"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"

    networks:
      - traefik-public

  # ── server (Django / Uvicorn SSE) ───────────────────────────────────────────
  server:
    image: ghcr.io/lagnajit09/autosage/autosage-server:latest
    container_name: autosage-server
    restart: unless-stopped

    env_file:
      - ./server.env

    environment:
      PYTHONUNBUFFERED: "1"

    volumes:
      - ./gcs-key.json:/run/secrets/gcs-key.json:ro

    stop_grace_period: 35s

    networks:
      - traefik-public

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

    labels:
      - "traefik.enable=true"

      # ── Router: Catch-all (Works for IP access) ──────────────────────────
      - "traefik.http.routers.server.rule=PathPrefix(`/`)"
      - "traefik.http.routers.server.entrypoints=web,web-api,websecure"
      - "traefik.http.routers.server.tls=true"

      # ── Backend port ─────────────────────────────────────────────────────
      - "traefik.http.services.server.loadbalancer.server.port=8000"

      # ── SSE / Streaming middleware ────────────────────────────────────────
      - "traefik.http.routers.server.middlewares=sse-headers@docker,sse-buffering@docker"

      - "traefik.http.middlewares.sse-headers.headers.customResponseHeaders.X-Accel-Buffering=no"
      - "traefik.http.middlewares.sse-buffering.buffering.maxResponseBodyBytes=0"

      # ── Health-check based routing (zero-downtime deploys) ───────────────
      - "traefik.http.services.server.loadbalancer.healthcheck.path=/api/health/"
      - "traefik.http.services.server.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.server.loadbalancer.healthcheck.timeout=5s"
